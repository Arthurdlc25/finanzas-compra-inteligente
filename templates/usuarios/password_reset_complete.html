<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Cambio Completado</title><script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script></head>
<body class="bg-slate-100 font-sans min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl text-center">
        <div class="text-4xl mb-4">✅</div>
        <h2 class="text-2xl font-bold text-gray-900 mb-4">¡Contraseña cambiada!</h2>
        <p class="text-gray-600 text-sm mb-6">Tu contraseña ha sido actualizada correctamente. Ya puedes iniciar sesión con tus nuevas credenciales de acceso.</p>
        <a href="{% url 'login' %}" class="inline-block px-6 py-2.5 bg-[#0f2e5c] text-white text-sm font-semibold rounded-xl hover:bg-blue-900 transition-colors">Iniciar sesión</a>
    </div>
</body></html>
